<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waitlist | Rta</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
        .waitlist-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
        }
        .back-link {
            margin-bottom: 2.5rem;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-link:hover {
            color: var(--accent);
            transform: translateX(-4px);
        }
        .iframe-container {
            width: 100%;
            max-width: 680px;
            height: 700px;
            border: 1px solid var(--border);
            border-radius: 32px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            overflow: hidden;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: invert(0.92) hue-rotate(180deg) brightness(1.1) contrast(0.9);
        }
        .footer-line {
            margin-top: 3rem;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="waitlist-body">
    <div class="waitlist-page">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            back to base
        </a>
        <div class="iframe-container">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSfnm1xCMBLUks3NIFWDfcyjvc6zIzC5gkQkevuXnTSGUnPQOQ/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">Loading…</iframe>
        </div>
        <p class="footer-line">Convergence Phase — October 2026</p>
    </div>
</body>
</html>
