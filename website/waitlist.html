<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waitlist | Rta</title>
    <link rel="stylesheet" href="/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .waitlist-page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
        }
        .back-link {
            margin-bottom: 3rem;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.2em;
            transition: all 0.3s var(--ease-premium);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-link:hover {
            color: var(--text);
            transform: translateX(-4px);
        }
        .iframe-container {
            width: 100%;
            max-width: 640px;
            height: 600px;
            border: 1px solid var(--border);
            border-radius: 32px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: invert(0.95) hue-rotate(180deg) brightness(1.2) contrast(0.85) grayscale(1);
            opacity: 0.8;
        }
        .footer-line {
            margin-top: 4rem;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.4;
        }
    </style>
</head>
<body class="waitlist-body">
    <div class="waitlist-page">
        <a href="/" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            return to base
        </a>
        <div class="iframe-container">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSfnm1xCMBLUks3NIFWDfcyjvc6zIzC5gkQkevuXnTSGUnPQOQ/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">Loading…</iframe>
        </div>
        <p class="footer-line">Convergence Phase — October 2026</p>
    </div>
</body>
</html>
